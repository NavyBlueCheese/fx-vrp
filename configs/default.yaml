# Every magic number in the project lives here. src/ contains zero numeric literals
# that describe the world; anything you might want to change for a robustness check
# is a config key.

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  reports_dir: docs/reports

dukascopy:
  base_url: "https://datafeed.dukascopy.com/datafeed"
  instrument: "EURUSD"
  # EURUSD point value: integer prices in .bi5 files are price / price_scale
  price_scale: 1.0e-5
  # one pip, for spread reporting
  pip: 1.0e-4
  # full-sample ingestion window (implied-index sample is capped at EVZ's death)
  start_date: "2007-01-01"
  end_date: "2025-03-11"
  # bounded window used by `make data-sample` and smoke tests
  sample_start_date: "2020-03-02"
  sample_end_date: "2020-03-31"
  max_retries: 3
  retry_backoff_s: 2.0
  # stress days (e.g. 2020-03) produce hour files that need well over 30s
  request_timeout_s: 90.0
  # pause between hour-file requests; recon showed unthrottled access is rate-limited
  throttle_s: 0.15

fred:
  base_url: "https://fred.stlouisfed.org/graph/fredgraph.csv"
  series:
    - "EVZCLS"   # EVZ close, 2007-11-01 .. 2025-03-11, DISCONTINUED — do not extend
    - "VIXCLS"   # equity VIX control
    - "DFF"      # fed funds effective, USD short rate
    - "EONIARATE" # EUR overnight until 2021-12; spliced with ESTR (see ecb)

ecb:
  base_url: "https://data-api.ecb.europa.eu/service/data"
  estr_series: "EST/B.EU000A2X2A25.WT"
  estr_start: "2019-10-01"

cboe:
  base_url: "https://cdn.cboe.com/api/global/delayed_quotes/options"
  # FXE is the object of study; _SPX validates the MFIV implementation against
  # published VIX (EVZ is decommissioned, so it cannot referee the replication);
  # the remaining currency ETFs are cheap cross-sectional colour.
  symbols: ["FXE", "_SPX", "FXY", "FXB", "UUP"]
  request_timeout_s: 30.0
  throttle_s: 1.0

chain_cleaning:
  # quotes must be two-sided: bid > min_bid and ask > bid
  min_bid: 0.0
  min_days_to_expiry: 1
  max_days_to_expiry: 370

quality:
  # a 24h FX weekday with fewer ticks than this is flagged in the quality report
  min_ticks_per_day: 5000
  # a quote unchanged for longer than this (seconds) counts as a stale run
  stale_run_s: 300.0
  # spreads wider than this (pips) are flagged as implausible for EURUSD
  max_plausible_spread_pips: 20.0
  # gaps longer than this (seconds) are reported (weekends are excluded separately)
  max_gap_report_s: 120.0
  # FX week: last Friday tick to first Sunday tick; gaps inside this window are weekend
  weekend_gap_min_hours: 24.0

realized:
  # baseline calendar-time sampling interval for RV (the standard bias/variance
  # compromise against microstructure noise; justified by the signature plot)
  grid_interval_s: 300
  # grid intervals for the volatility signature plot, finest to coarsest
  signature_intervals_s: [5, 10, 30, 60, 120, 300, 600, 1200, 1800]
  # TSRV slow-scale subgrid count for real data (tests choose their own)
  tsrv_subgrids: 30
  # sparse interval used to proxy integrated variance in the kernel bandwidth rule
  kernel_sparse_interval_s: 1200
  # a day with fewer grid returns than this gets null estimators and a flag
  min_returns_per_day: 36
  # FX day boundary: the day labelled D covers (D-1 17:00, D 17:00] New York time
  day_close_local: "17:00"
  day_close_tz: "America/New_York"

simulate:
  default_seed: 42
